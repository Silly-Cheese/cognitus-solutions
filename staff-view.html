<!DOCTYPE html>
<html>
<head><title>Staff Viewer</title></head>
<body>
<h1>View Applications</h1>
<input id="id" placeholder="Discord ID">
<button onclick="load()">Load</button>
<div id="out"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
const app=initializeApp({ apiKey:"AIzaSyCnFyOTUVOxz14Ef2BwtcxdTAr3-xj3uwE", projectId:"cognitus-solutio" });
const db=getFirestore(app);
window.load=async()=>{
const snap=await getDocs(collection(db,"applications"));
let out="";
snap.forEach(d=>{const x=d.data();out+=`<div><b>${x.department}</b> ${x.discordId} ${x.status}</div>`});
document.getElementById("out").innerHTML=out;
}
</script>
</body>
</html>
